name: Prettify index.html

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prettify-html:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2️⃣ Convert 1-line HTML → neat multi-line HTML
      - name: Rebuild index.html neatly
        run: |
          sed 's/"/\\"/g; s/^/"/; s/$/"/' index.html > printf_lines.txt
          printf "%b\n" $(cat printf_lines.txt) > index_new.html
          mv index_new.html index.html

      # 3️⃣ Commit + push
      - name: Commit and Push index.html
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Prettified index.html via GitHub Actions" || echo "No changes to commit"
          git push origin HEAD:main
