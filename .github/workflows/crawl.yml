name: EchoSearch Crawl

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # IMPORTANT: fetch full history so pull works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapy crawler
        run: |
          scrapy crawl echo_spider -O crawl_output.json

      - name: Check crawl_output exists
        id: check_output
        run: |
          if [ -f crawl_output.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload crawl_output artifact
        if: steps.check_output.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crawl_output
          path: crawl_output.json

      - name: Pull latest before committing
        run: |
          git pull --rebase origin main || true

      - name: Commit crawl output
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add crawl_output.json || echo "No file to add"
          git commit -m "Update crawl output" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
