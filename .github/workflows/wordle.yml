name: Auto-Push Wordle

on:
  workflow_dispatch:  

jobs:
  generate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create index.html
        run: |
          cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wordle Unlimited</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial, sans-serif;
background:#121213;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:6px;
justify-content:center;
margin-top:30px;
}

#toast{
position:fixed;
top:20%;
left:50%;
transform:translateX(-50%);
background:#3a3a3c;
color:white;
padding:12px 18px;
border-radius:6px;
font-weight:bold;
opacity:0;
pointer-events:none;
transition:opacity .3s;
}

#toast.show{
opacity:1;
}

.tile{
width:60px;
height:60px;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
text-transform:uppercase;
transition:transform .3s;
}

.flip{
transform:rotateX(90deg);
}

.correct{ background:#538d4e; border:none; }
.present{ background:#b59f3b; border:none; }
.absent{ background:#3a3a3c; border:none; }

#keyboard{
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.key{
display:inline-block;
margin:3px;
padding:10px 12px;
background:#818384;
border-radius:4px;
cursor:pointer;
user-select:none;
font-size:14px;
}

.key.correct{ background:#538d4e; }
.key.present{ background:#b59f3b; }
.key.absent{ background:#3a3a3c; }

button{
margin-top:15px;
padding:8px 14px;
font-size:14px;
}

#instructionsToast {
  position: fixed;
  top: 10%;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #121213;
  color: #ffffff;
  padding: 20px;
  border-radius: 12px;
  font-weight: bold;
  text-align: center;
  max-width: 350px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 9999;
}

#instructionsToast.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

#instructionsToast h3 {
  margin: 0 0 10px 0;
  font-size: 18px;
}

#instructionsToast p {
  margin: 6px 0;
  font-weight: normal;
  font-size: 14px;
}

.exampleRow {
  display: flex;
  justify-content: center;
  margin: 5px 0;
}

.exampleRow .tile {
  width: 40px;
  height: 40px;
  border: 2px solid #3a3a3c;
  margin: 0 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 18px;
}

.tile.correct { background: #538d4e; border: none; color: white; }
.tile.present { background: #b59f3b; border: none; color: white; }
.tile.absent { background: #3a3a3c; border: none; color: white; }

#instructionsToast button {
  margin-top: 10px;
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  background: #818384;
  color: white;
  border: none;
}

#statsPopup{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:9999;
}

#statsPopup.show{
opacity:1;
pointer-events:auto;
}

#statsCard{
background:#121213;
padding:25px;
border-radius:16px;
width:90%;
max-width:400px;
text-align:center;
}

#closeStats{
position:absolute;
right:20px;
top:15px;
cursor:pointer;
}

#statsGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
margin:15px 0;
}

#guessBars div{
display:flex;
align-items:center;
margin:4px 0;
}

.bar{
height:20px;
background:#538d4e;
margin-left:8px;
text-align:right;
padding-right:5px;
font-size:12px;
}

#statsButtons{
margin-top:15px;
display:flex;
justify-content:space-between;
}

#botPopup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: .3s;
  z-index: 999999;
}

#botPopup.show {
  opacity: 1;
  pointer-events: auto;
}

#botCard {
  background: #121213;
  padding: 25px;
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
  text-align: left;
  color: white;
  position: relative;
}

#closeBot {
  position: absolute;
  right: 20px;
  top: 15px;
  cursor: pointer;
  font-size: 22px;
}

#badgesArea div {
  margin: 6px 0;
  font-size: 16px;
}
</style>
</head>

<body>
<h1>Wordle Unlimited</h1>
<label>
<input type="checkbox" id="hardMode"> Hard Mode
</label>

<div id="board"></div>
<div id="keyboard"></div>
<div id="toast"></div>

<div id="instructionsToast" class="toast">
<h3>How to play</h3>
<p>Guess the <strong>WORDLE</strong> in 6 tries.</p>
<div class="exampleRow">
<div class="tile correct">W</div>
<div class="tile">E</div>
<div class="tile">A</div>
<div class="tile">R</div>
<div class="tile">Y</div>
</div>
<p><strong>W</strong> is in the word and in the correct spot.</p>

<div class="exampleRow">
<div class="tile">P</div>
<div class="tile present">I</div>
<div class="tile">L</div>
<div class="tile">L</div>
<div class="tile">S</div>
</div>
<p><strong>I</strong> is in the word but in the wrong spot.</p>

<div class="exampleRow">
<div class="tile">V</div>
<div class="tile">A</div>
<div class="tile">G</div>
<div class="tile absent">U</div>
<div class="tile">E</div>
</div>
<p><strong>U</strong> is not in the word in any spot.</p>

<button id="closeInstructionsToast">Got it!</button>
</div>

<div id="statsPopup">
<div id="statsCard">
<span id="closeStats">✕</span>
<h2>STATISTICS</h2>
<div id="statsGrid"></div>
<h3>GUESS DISTRIBUTION</h3>
<div id="guessBars"></div>
<h3 id="badgesHeader" style="display:none;">BADGES</h3>
<div id="badgesArea"></div>
<div id="statsButtons">
<button onclick="location.reload()">PLAY AGAIN</button>
<button onclick="shareGrid()">SHARE</button>
</div>
</div>
</div>

<div id="botPopup">
<div id="botCard">
<span id="closeBot">✕</span>
<h2>WORDLE BOT</h2>
<div id="botText"></div>
</div>
</div>

<script>
// Full JS code as you pasted goes here
// copy everything from your <script> section in the HTML you provided
const WORDS=["about","above","abuse","actor","acute","admit","adopt","adult","after","again","agent","agree","ahead","alarm","album","alert","alike","alive","allow","alone","along","alter","among","anger","angle","angry","apart","apple","apply","argue","arise","array","aside","asset","audio","audit","avoid","award","aware","badly","baker","bases","basic","basis","beach","began","begin","begun","being","below","bench","billy","birth","black","blame","blind","block","blood","board","boost","booth","bound","brain","brand","bread","break","breed","brick","brief","bring","broad","broke","brown","build","built","buyer","cable","carry","catch","cause","chain","chair","chart","chase","cheap","check","cheek","cheer","chest","chief","child","china","choir","chose","civil","claim","class","clean","clear","click","clock","close","coach","coast","could","count","court","cover","craft","crash","cream","crime","cross","crowd","crown","curve","cycle","daily","dance","dated","dealt","death","debut","delay","depth","doing","doubt","dozen","draft","drama","drawn","dream","dress","drill","drink","drive","drove","dying","eager","early","earth","eight","elite","empty","enemy","enjoy","enter","entry","equal","error","event","every","exact","exist","extra","faith","false","fault","favor","fewer","field","fifth","fifty","fight","final","first","fixed","flash","fleet","floor","focus","force","forth","forty","forum","found","frame","frank","fraud","fresh","front","fruit","fully","funny","giant","given","glass","globe","going","grace","grade","grand","grant","grass","great","green","gross","group","grown","guard","guess","guest","guide","happy","harry","heart","heavy","hence","henry","horse","hotel","house","human","ideal","image","imply","index","inner","input","issue","japan","jimmy","joint","jones","judge","known","label","large","laser","later","laugh","layer","learn","least","leave","legal","level","light","limit","links","lives","local","logic","loose","lower","lucky","lunch","lying","magic","major","maker","march","maria","match","maybe","mayor","meant","media","metal","might","minor","minus","mixed","model","money","month","moral","motor","mount","mouse","mouth","movie","music","needs","never","newly","night","noise","north","noted","novel","nurse","occur","ocean","offer","often","order","other","ought","paint","panel","paper","party","peace","peter","phase","phone","photo","piece","pilot","pitch","place","plain","plane","plant","plate","point","pound","power","press","price","pride","prime","print","prior","prize","proof","proud","prove","queen","quick","quiet","quite","radio","raise","range","rapid","ratio","reach","react","ready","refer","right","rival","river","robin","rough","round","route","royal","rural","scale","scene","scope","score","serve","seven","shall","shape","share","sharp","sheet","shelf","shell","shift","shine","shirt","shock","shoot","short","shown","sight","since","sixth","sixty","skill","slave","sleep","slide","small","smart","smile","smith","smoke","snake","snowy","solid","solve","sorry","sound","south","space","spare","speak","speed","spend","spent","split","spoke","sport","staff","stage","stake","stand","start","state","steam","steel","stick","still","stock","stone","stood","store","storm","story","strip","stuck","study","stuff","style","sugar","suite","super","sweet","table","taken","taste","tasty","teach","teeth","thank","theft","their","theme","there","these","thick","thing","think","third","those","three","threw","throw","tight","title","today","topic","total","touch","tough","tower","track","trade","trail","train","trend","trial","tribe","trick","tried","tries","truck","truly","trust","truth","twice","under","undue","union","unite","unity","until","upper","upset","urban","usage","usual","value","video","virus","visit","vital","voice","waste","watch","water","waves","wears","weigh","where","which","while","white","whole","whose","woman","women","world","worry","worse","worth","would","wound","write","wrong","wrote","young","youth","zebra","zesty"];

const MAX_GUESSES=6;
const WORD_LENGTH=5;

let WORD;
let currentRow;
let currentGuess;
let gameOver=false;

let stats=JSON.parse(localStorage.getItem("wordleStats"))||{
played:0,
wins:0,
streak:0,
maxStreak:0
};

let guessStats = JSON.parse(localStorage.getItem("guessStats")) || [0,0,0,0,0,0];

const board=document.getElementById("board");
const keyboard=document.getElementById("keyboard");
const toast=document.getElementById("toast");

function showStatsPopup(win){

if(win){
guessStats[currentRow]=(guessStats[currentRow]||0)+1;
localStorage.setItem("guessStats",JSON.stringify(guessStats));
}

document.getElementById("statPlayed").textContent=stats.played;
document.getElementById("statWin").textContent=Math.round((stats.wins/stats.played)*100)||0;
document.getElementById("statStreak").textContent=stats.streak;
document.getElementById("statMax").textContent=stats.maxStreak;

const bars=document.getElementById("guessBars");
bars.innerHTML="";

guessStats.forEach((num,i)=>{
const row=document.createElement("div");

const label=document.createElement("span");
label.textContent=i+1;

const bar=document.createElement("div");
bar.className="bar";
bar.style.width=(num*30+10)+"px";
bar.textContent=num;

row.appendChild(label);
row.appendChild(bar);
bars.appendChild(row);
});

document.getElementById("statsPopup").classList.add("show");
}

document.getElementById("closeStats").onclick=()=>{
document.getElementById("statsPopup").classList.remove("show");
};

function pickWord(){
return WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
}

function newGame(){

board.innerHTML="";
keyboard.innerHTML="";

WORD=pickWord();
currentRow=0;
currentGuess="";
gameOver=false;

createBoard();
createKeyboard();

}

function createBoard(){

for(let i=0;i<MAX_GUESSES*WORD_LENGTH;i++){
const tile=document.createElement("div");
tile.className="tile";
board.appendChild(tile);
}

}

function createKeyboard(){

const rows=["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];

rows.forEach(row=>{

const div=document.createElement("div");

for(let l of row){

const key=document.createElement("span");
key.className="key";
key.textContent=l;
key.onclick=()=>press(l);
div.appendChild(key);

}

keyboard.appendChild(div);

});

const enter=document.createElement("span");
enter.className="key";
enter.textContent="ENTER";
enter.onclick=submitGuess;
keyboard.appendChild(enter);

const del=document.createElement("span");
del.className="key";
del.textContent="DEL";
del.onclick=deleteLetter;
keyboard.appendChild(del);

}

function press(letter){

if(gameOver) return;

if(currentGuess.length<WORD_LENGTH){
currentGuess+=letter;
updateBoard();
}

}

function deleteLetter(){

currentGuess=currentGuess.slice(0,-1);
updateBoard();

}

function updateBoard(){

const tiles=document.querySelectorAll(".tile");

for(let i=0;i<WORD_LENGTH;i++){

const tile=tiles[currentRow*WORD_LENGTH+i];
tile.textContent=currentGuess[i]||"";

}

}

function colorKey(letter,state){

document.querySelectorAll(".key").forEach(k=>{

if(k.textContent===letter){

if(state==="correct") k.className="key correct";
else if(state==="present" && !k.classList.contains("correct"))
k.className="key present";
else if(state==="absent" && !k.classList.contains("correct") && !k.classList.contains("present"))
k.className="key absent";

}

});

}

async function submitGuess(){

if(gameOver) return;
if(currentGuess.length!==WORD_LENGTH) return;

const valid = await isRealWord(currentGuess);

if(!valid){
showToast("Not a real word");
return;
}

if(document.getElementById("hardMode").checked){

for(let i=0;i<WORD_LENGTH;i++){

const tiles=document.querySelectorAll(".tile");
const prev=tiles[(currentRow-1)*WORD_LENGTH+i];

if(prev && prev.classList.contains("correct") && currentGuess[i]!==prev.textContent){

showToast("Hard mode: must reuse green letters");
return;

}

}

}

const tiles=document.querySelectorAll(".tile");

for(let i=0;i<WORD_LENGTH;i++){

const tile=tiles[currentRow*WORD_LENGTH+i];
const letter=currentGuess[i];

setTimeout(()=>{

tile.classList.add("flip");

setTimeout(()=>{

if(letter===WORD[i]){
tile.classList.add("correct");
colorKey(letter,"correct");
}

else if(WORD.includes(letter)){
tile.classList.add("present");
colorKey(letter,"present");
}

else{
tile.classList.add("absent");
colorKey(letter,"absent");
}

tile.classList.remove("flip");

},150);

},i*300);

}

if(currentGuess===WORD){

gameOver=true;

stats.played++;
stats.wins++;
stats.streak++;
stats.maxStreak=Math.max(stats.streak,stats.maxStreak);

localStorage.setItem("wordleStats",JSON.stringify(stats));

setTimeout(()=>{

showToast("Splendid");

shareGrid();

showStatsPopup(true);

},1600);

return;

}

currentRow++;
currentGuess="";

if(currentRow===MAX_GUESSES){

gameOver=true;

stats.played++;
stats.streak=0;

localStorage.setItem("wordleStats",JSON.stringify(stats));

setTimeout(()=>{

showToast("Game Over! Word was "+WORD);

shareGrid();

setTimeout(()=>{
showStatsPopup(false);
},1600);

},1600);

}
}

function shareGrid(){

let grid="";

const tiles=document.querySelectorAll(".tile");

for(let r=0;r<=currentRow;r++){

for(let c=0;c<WORD_LENGTH;c++){

const t=tiles[r*WORD_LENGTH+c];

if(t.classList.contains("correct")) grid+="🟩";
else if(t.classList.contains("present")) grid+="🟨";
else grid+="⬛";

}

grid+="\n";

}

const text = 
"Wordle Unlimited\n" +
(currentGuess===WORD ? (currentRow+1)+"/6" : "X/6") +
"\n\n" +
grid +
"\nPlay now → https://echo-search.github.io/addtoechosearch/wordle";

// Use native share if available
if(navigator.share){
navigator.share({
title: "Wordle Unlimited",
text: text
}).catch(()=>{});
}else{
// fallback to clipboard
if(navigator.clipboard && window.isSecureContext){
navigator.clipboard.writeText(text);
showToast("Copied to clipboard");
}else{
fallbackCopy(text);
}
}

}

function fallbackCopy(text){
const textarea=document.createElement("textarea");
textarea.value=text;
document.body.appendChild(textarea);
textarea.select();
try{
document.execCommand("copy");
showToast("Copied to clipboard");
}catch{
showToast("Copy failed");
}
document.body.removeChild(textarea);
}

document.addEventListener("keydown",e=>{

const key=e.key.toUpperCase();

if(key==="ENTER") submitGuess();
else if(key==="BACKSPACE") deleteLetter();
else if(/^[A-Z]$/.test(key)) press(key);

});

newGame();

async function isRealWord(word){

const res = await fetch("https://api.datamuse.com/words?sp=" + word.toLowerCase() + "&max=1");
const data = await res.json();

return data.length > 0 && data[0].word === word.toLowerCase();

}

function showToast(text){

const toast=document.getElementById("toast");

toast.textContent=text;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

window.addEventListener("load", () => {
  if(!localStorage.getItem("seenInstructions")){
    const toast = document.getElementById("instructionsToast");
    toast.classList.add("show");
  }
});

document.getElementById("closeInstructionsToast").onclick = () => {
  const toast = document.getElementById("instructionsToast");
  toast.classList.remove("show");
  localStorage.setItem("seenInstructions", "true");
};

let badges = JSON.parse(localStorage.getItem("wordleBadges")) || {};

function awardBadge(name, emoji) {
  if (!badges[name]) {
    badges[name] = emoji;
    localStorage.setItem("wordleBadges", JSON.stringify(badges));
  }
}

function updateBadgesUI() {
  const area = document.getElementById("badgesArea");
  const header = document.getElementById("badgesHeader");

  area.innerHTML = "";

  const keys = Object.entries(badges);

  if (keys.length === 0) {
    header.style.display = "none";
    area.style.display = "none";
    return;
  }

  header.style.display = "block";
  area.style.display = "block";

  keys.forEach(([name, emoji]) => {
    const div = document.createElement("div");
    div.textContent = `${emoji} ${name}`;
    area.appendChild(div);
  });
}



/* ============================================================= */
/* ===================== ADDED: WORDLE BOT ===================== */
/* ============================================================= */


function matchPattern(word, guess, solution) {
  for (let i = 0; i < 5; i++) {
    if (guess[i] === solution[i] && word[i] !== guess[i]) return false;
    if (solution.includes(guess[i]) && !word.includes(guess[i])) return false;
  }
  return true;
}

function wordleBotAnalysis(guesses, solution) {
  let remaining = WORDS.map(w => w.toUpperCase());
  let log = [];

  guesses.forEach((guess, index) => {
    const before = remaining.length;
    remaining = remaining.filter(w => matchPattern(w, guess, solution));
    const after = remaining.length;

    log.push(
`Guess ${index+1}: ${guess}
Eliminated **${before - after}** words
Remaining: **${after}**`
    );
  });

  const rating = remaining.length < 3 ? "A+" : remaining.length < 10 ? "A" : "B";

  log.push(`Final Rating: **${rating}**`);

  return log.join("\n\n");
}

function showBotPopup(text) {
  const box = document.getElementById("botPopup");
  document.getElementById("botText").innerHTML = text.replace(/\n/g, "<br>");
  box.classList.add("show");
}

document.getElementById("closeBot").onclick = () => {
  document.getElementById("botPopup").classList.remove("show");
};




/* ============================================================= */
/* ========== HOOK INTO YOUR EXISTING END-GAME HANDLING ========= */
/* ============================================================= */

const originalShowStatsPopup = showStatsPopup;

showStatsPopup = function(win) {

  originalShowStatsPopup(win);

  updateBadgesUI();

  // Award badges
  if (win && currentRow === 0) awardBadge("Perfect Game", "🎯");
  if (win && currentRow === 1) awardBadge("Speed Solver", "⚡");
  if (win && stats.streak >= 10) awardBadge("Streak Master", "🟩");

  // Setup bot analysis
  setTimeout(() => {
    const tiles = document.querySelectorAll(".tile");
    const guesses = [];

    for (let r = 0; r <= currentRow; r++) {
      let g = "";
      for (let c = 0; c < 5; c++) {
        g += tiles[r*5 + c].textContent;
      }
      guesses.push(g);
    }

    const analysis = wordleBotAnalysis(guesses, WORD);

    if (analysis.includes("Eliminated 200"))
      awardBadge("Genius Guess", "🧠");

    showBotPopup(analysis);

  }, 2000);
};

</script>

</body>
</html>
EOF

      - name: Commit and Push index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-generate Wordle index.html via GitHub Actions" || echo "No changes to commit"
          git push
