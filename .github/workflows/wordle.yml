name: Auto Generate index.html

on:
  workflow_dispatch:

jobs:
  generate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create index.html (1 line)
        run: |
          echo "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Auto Generated Page</title></head><body><h1>Hello from GitHub Actions!</h1></body></html>" > index.html

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Stage index.html
        run: |
          git add index.html

      - name: Commit index.html
        run: |
          git commit -m "Auto-generate index.html via GitHub Actions" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
